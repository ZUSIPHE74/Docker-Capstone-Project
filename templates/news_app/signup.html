{% extends 'news_app/base.html' %}
{% block title %}Sign Up - NewsApp{% endblock %}
{% block content %}

<div style="max-width: 420px; margin: 60px auto;">
    <div class="form-card fade-in">
        <div style="text-align:center; margin-bottom: 32px;">
            <h1 style="font-size:1.5rem;">Create account</h1>
            <p>Register to start using NewsApp</p>
        </div>
        <form method="post" id="signupForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding: 12px;">
                Create Account
            </button>
        </form>
    </div>
</div>

{% endblock %}
